<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unblocked Games Hub</title>
    <!-- Tailwind CDN for zero-build styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="bg-[#0a0a0a] text-white font-['Space_Grotesk']">
    <div class="min-h-screen p-4 md:p-8 max-w-7xl mx-auto">
        <!-- Header -->
        <header class="mb-12 flex flex-col md:flex-row md:items-end justify-between gap-6">
            <div>
                <div class="flex items-center gap-3 mb-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#00ff00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="6" y1="12" x2="10" y2="12"></line><line x1="8" y1="10" x2="8" y2="14"></line><rect x="2" y="6" width="20" height="12" rx="2"></rect><line x1="15" y1="13" x2="15.01" y2="13"></line><line x1="18" y1="11" x2="18.01" y2="11"></line></svg>
                    <h1 class="text-4xl md:text-6xl font-bold tracking-tighter uppercase italic">
                        Unblocked<span class="text-[#00ff00]">Hub</span>
                    </h1>
                </div>
                <p class="text-zinc-500 font-mono text-sm uppercase tracking-widest">
                    // Pure Gaming / No AI / No Blocks
                </p>
            </div>

            <div class="relative w-full md:w-96">
                <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-zinc-500" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input
                    type="text"
                    id="searchInput"
                    placeholder="SEARCH GAMES..."
                    class="w-full bg-zinc-900 border-2 border-white p-4 pl-12 font-mono focus:outline-none focus:border-[#00ff00] transition-colors"
                >
            </div>
        </header>

        <!-- Games Grid -->
        <div id="gamesGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            <!-- Games will be injected here -->
        </div>

        <div id="noResults" class="hidden text-center py-20 border-2 border-dashed border-zinc-800">
            <p class="font-mono text-zinc-500 uppercase tracking-widest">No games found matching your search.</p>
        </div>

        <!-- Game Player Modal -->
        <div id="gameModal" class="fixed inset-0 z-50 bg-black/95 hidden items-center justify-center p-4 md:p-10">
            <div id="modalContent" class="bg-zinc-900 border-2 border-white flex flex-col w-full max-w-5xl aspect-video transition-all duration-300">
                <!-- Toolbar -->
                <div class="p-3 border-b-2 border-white flex items-center justify-between bg-zinc-800">
                    <div class="flex items-center gap-3">
                        <span class="w-3 h-3 rounded-full bg-red-500"></span>
                        <span class="w-3 h-3 rounded-full bg-yellow-500"></span>
                        <span class="w-3 h-3 rounded-full bg-green-500"></span>
                        <h2 id="modalTitle" class="ml-2 font-bold uppercase tracking-tight">Game Title</h2>
                    </div>
                    <div class="flex items-center gap-4">
                        <button id="toggleFullscreen" class="hover:text-[#00ff00] transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg>
                        </button>
                        <a id="externalLink" href="#" target="_blank" class="hover:text-[#00ff00] transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
                        </a>
                        <button id="closeModal" class="hover:text-red-500 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                        </button>
                    </div>
                </div>

                <!-- Iframe Container -->
                <div class="flex-1 bg-black relative">
                    <iframe id="gameIframe" src="" class="w-full h-full border-none" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; full-screen"></iframe>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer class="mt-20 pt-8 border-t-2 border-zinc-900 flex flex-col md:flex-row justify-between items-center gap-4 text-zinc-600 font-mono text-[10px] uppercase tracking-widest">
            <p>© 2026 UNBLOCKED HUB // ALL RIGHTS RESERVED</p>
            <div class="flex gap-6">
                <a href="#" class="hover:text-white transition-colors">Privacy</a>
                <a href="#" class="hover:text-white transition-colors">Terms</a>
                <a href="#" class="hover:text-white transition-colors">Contact</a>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
